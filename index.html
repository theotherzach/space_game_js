<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Space Game (JS)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="hud">
  <div id="status">
    <span id="minerals">0</span> minerals
    <span class="sep">·</span>
    <span id="energy">0</span>/<span id="energy-max">0</span> energy
    <span class="sep">·</span>
    Mission <span id="mission">1</span>
    <span class="sep">·</span>
    <span id="clock">00:00</span>
    <span class="sep">·</span>
    Goal: <span id="goal">0</span>
    <span class="sep">·</span>
    Field: <span id="total-minerals">0</span>
  </div>
  <div id="speeds">
    <button data-speed="0">Pause</button>
    <button data-speed="0.5">Slow</button>
    <button data-speed="1" class="active">Normal</button>
    <button data-speed="3">Fast</button>
    <button id="mute" title="Toggle audio (M)">🔊</button>
    <button id="restart">Restart</button>
  </div>
</div>

<canvas id="game" width="1024" height="640"></canvas>

<div id="build">
  <button data-build="relay" title="Relay (1) — 20 min."><b>Relay</b><span class="cost">20 <em>1</em></span></button>
  <button data-build="miner" title="Miner (2) — 45 min."><b>Miner</b><span class="cost">45 <em>2</em></span></button>
  <button data-build="energy" title="Energy (3) — 200 min."><b>Energy</b><span class="cost">200 <em>3</em></span></button>
  <button data-build="laser" disabled title="Laser turret — coming next batch"><b>Laser</b><span class="cost">100 <em>6</em></span></button>
  <button data-build="rocket" disabled title="Rocket turret — coming next batch"><b>Rocket</b><span class="cost">400 <em>7</em></span></button>
  <button data-build="cancel" class="cancel">Cancel</button>
  <span id="hint">Click a building or press 1/2/3. Right-click drag to pan, wheel zooms.</span>
</div>

<script src="game.js"></script>
</body>
</html>
