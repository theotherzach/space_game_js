<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Space Game (JS)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="hud">
  <div id="status">
    <span id="minerals">0</span>min
    <span class="sep">·</span>
    <span id="energy">0</span>/<span id="energy-max">0</span>e
    <span class="sep">·</span>
    M<span id="mission">1</span> <span id="mission-label" class="muted"></span>
    <span class="sep">·</span>
    <span id="clock">00:00</span>
    <span class="sep">·</span>
    Goal: <span id="goal">0</span>
    <span class="sep">·</span>
    Field: <span id="total-minerals">0</span>
  </div>
  <div id="speeds">
    <button data-speed="0">Pause</button>
    <button data-speed="0.5">Slow</button>
    <button data-speed="1" class="active">Normal</button>
    <button data-speed="3">Fast</button>
    <button id="send-wave" title="Skip the wave countdown (V)">Send wave</button>
    <button id="mute" title="Toggle audio (M)">🔊</button>
    <button id="restart">Restart</button>
  </div>
</div>

<div id="missions">
  <button data-level="1">Easy</button>
  <button data-level="2">Normal</button>
  <button data-level="3">Hard</button>
  <button data-level="4">Madness!</button>
  <button data-level="5">Survivor: Gentle</button>
  <button data-level="6">Survivor: Bring it</button>
  <button data-level="7">Survivor: No Hope</button>
  <button data-level="8">Speed Miner</button>
  <button data-level="9">Sandbox</button>
</div>

<canvas id="game" width="1024" height="640"></canvas>

<div id="selection" class="hidden">
  <button id="sel-close" title="Close (Esc)">×</button>
  <div id="sel-name">—</div>
  <div id="sel-stats">—</div>
  <div id="sel-actions">
    <button id="sel-upgrade">Upgrade</button>
    <button id="sel-sell">Sell</button>
  </div>
</div>

<div id="build">
  <button data-build="relay" title="Relay (1) — 20 min."><b>Relay</b><span class="cost">20 <em>1</em></span></button>
  <button data-build="miner" title="Miner (2) — 45 min."><b>Miner</b><span class="cost">45 <em>2</em></span></button>
  <button data-build="energy" title="Energy (3) — 200 min."><b>Energy</b><span class="cost">200 <em>3</em></span></button>
  <button data-build="store" title="Store (4) — 300 min."><b>Store</b><span class="cost">300 <em>4</em></span></button>
  <button data-build="repair" title="Repair (5) — 300 min."><b>Repair</b><span class="cost">300 <em>5</em></span></button>
  <button data-build="laser" title="Laser turret (6) — 100 min."><b>Laser</b><span class="cost">100 <em>6</em></span></button>
  <button data-build="rocket" title="Rocket turret (7) — 400 min."><b>Rocket</b><span class="cost">400 <em>7</em></span></button>
  <button data-build="cancel" class="cancel">Cancel</button>
  <span id="hint">Click a building or press 1/2/3. Right-click drag to pan, wheel zooms.</span>
</div>

<script src="game.js"></script>
</body>
</html>
