<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Space Game (JS)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="hud">
  <div id="status">
    <span id="minerals">0</span> minerals
    <span class="sep">·</span>
    <span id="rate">0</span>/min
    <span class="sep">·</span>
    <span id="energy">0</span>/<span id="energy-max">0</span> energy
    <span class="sep">·</span>
    Mission <span id="mission">1</span> <span id="mission-label" class="muted"></span>
    <span class="sep">·</span>
    <span id="clock">00:00</span>
    <span class="sep">·</span>
    Goal: <span id="goal">0</span>
  </div>
  <div id="speeds">
    <button data-speed="0">Pause</button>
    <button data-speed="0.5">Slow</button>
    <button data-speed="1" class="active">Normal</button>
    <button data-speed="3">Fast</button>
    <button id="send-wave" title="Skip the wave countdown (W)">Send wave</button>
    <button id="research" title="Research (R)">Research</button>
    <button id="missions" title="Mission select">Missions</button>
    <button id="mute" title="Toggle audio (M)">🔊</button>
    <button id="restart">Restart</button>
  </div>
</div>

<canvas id="game" width="1024" height="640"></canvas>

<div id="build">
  <button data-build="connector"><b>Connector</b><span class="cost">15</span></button>
  <button data-build="miner"><b>Miner</b><span class="cost">40</span></button>
  <button data-build="turret"><b>Turret</b><span class="cost">60</span></button>
  <button data-build="laser"><b>Laser</b><span class="cost">150</span></button>
  <button data-build="booster"><b>Booster</b><span class="cost">80</span></button>
  <button data-build="sell" class="sell"><b>Sell</b><span class="cost">refund 60%</span></button>
  <button data-build="cancel" class="cancel">Cancel</button>
  <span id="hint">Click a building to start placing. Then click on the map.</span>
</div>

<div id="banner" class="hidden"><div id="banner-text"></div></div>

<div id="mission-panel" class="hidden">
  <div id="mission-panel-inner">
    <div id="mission-header">
      <h2>Missions</h2>
      <button id="mission-close" title="Close (Esc)">×</button>
    </div>
    <div id="mission-list"></div>
    <div id="mission-footer">Tech research is carried across missions. <button id="reset-save" class="link">Reset save</button></div>
  </div>
</div>

<div id="tech-panel" class="hidden">
  <div id="tech-panel-inner">
    <div id="tech-header">
      <h2>Research</h2>
      <button id="tech-close" title="Close (Esc)">×</button>
    </div>
    <div id="tech-tree"></div>
    <div id="tech-footer">Each tech is a one-time purchase. Game is paused while this panel is open.</div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
